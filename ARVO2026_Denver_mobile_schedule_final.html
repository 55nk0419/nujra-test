<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ARVO 2026 Denver Schedule</title>
<style>
:root {
  --bg: #f6f7fb;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --line: #e5e7eb;
  --blue: #2563eb;
  --blue-soft: #eaf1ff;
  --yellow: #fff4c2;
  --yellow-line: #f0c34a;
  --green: #0f766e;
  --green-soft: #e6fffb;
  --red: #b91c1c;
  --shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.45;
}
header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(246, 247, 251, 0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 12px 12px 10px;
}
.header-title {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
}
h1 {
  margin: 0;
  font-size: 19px;
  letter-spacing: -0.02em;
}
.updated {
  color: var(--muted);
  font-size: 11px;
  white-space: nowrap;
}
.summary {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin: 10px 0 8px;
}
.summary .pill {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 8px 10px;
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
}
.pill .label {
  display: block;
  color: var(--muted);
  font-size: 11px;
}
.pill .value {
  display: block;
  font-weight: 650;
  font-size: 13px;
}
.pill a {
  color: var(--blue);
  text-decoration: none;
  font-weight: 750;
}
.pill a:active {
  opacity: 0.7;
}
.controls {
  display: grid;
  gap: 8px;
}
.tabs {
  display: flex;
  overflow-x: auto;
  gap: 7px;
  padding: 2px 0 4px;
  -webkit-overflow-scrolling: touch;
}
.tab {
  border: 1px solid var(--line);
  background: var(--card);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
}
.tab.active {
  border-color: var(--blue);
  background: var(--blue);
  color: #fff;
}
.control-row {
  display: grid;
  grid-template-columns: 1fr 0.9fr;
  gap: 8px;
}
input, select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 10px;
  font-size: 14px;
  background: #fff;
  color: var(--text);
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
}
.toggle {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 7px 10px;
}
.toggle input {
  width: auto;
}
main {
  padding: 12px;
  max-width: 960px;
  margin: 0 auto;
}
.count {
  color: var(--muted);
  font-size: 13px;
  margin: 4px 2px 10px;
}
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 13px;
  margin-bottom: 11px;
  box-shadow: var(--shadow);
}
.card.action {
  background: linear-gradient(0deg, rgba(255, 244, 194, 0.62), rgba(255, 255, 255, 0.92));
  border-color: var(--yellow-line);
}
.card-head {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}
.datetime {
  display: flex;
  flex-direction: column;
  min-width: 82px;
}
.date {
  font-weight: 800;
  font-size: 15px;
}
.time {
  color: var(--blue);
  font-weight: 800;
  font-size: 15px;
}
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  justify-content: flex-end;
}
.badge {
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 11px;
  font-weight: 650;
  background: var(--blue-soft);
  color: #1d4ed8;
}
.badge.status {
  background: var(--green-soft);
  color: var(--green);
}
.badge.candidate {
  background: #f3f4f6;
  color: var(--muted);
}
.badge.action-badge {
  background: var(--yellow);
  color: #7a4b00;
}
.presenter {
  color: var(--muted);
  font-size: 13px;
  margin: 2px 0 4px;
}
.title-ja {
  font-weight: 800;
  font-size: 16px;
  letter-spacing: -0.01em;
  margin: 2px 0 5px;
}
.title-en {
  color: #374151;
  font-size: 13px;
  margin: 0 0 9px;
}
.meta {
  display: grid;
  grid-template-columns: 1fr;
  gap: 5px;
  color: #374151;
  font-size: 12px;
  border-top: 1px solid var(--line);
  padding-top: 8px;
}
.meta-line {
  display: flex;
  gap: 6px;
}
.meta-key {
  color: var(--muted);
  min-width: 82px;
  flex: 0 0 auto;
}
.memo {
  margin-top: 8px;
  padding: 9px 10px;
  border-radius: 12px;
  background: #f9fafb;
  color: #374151;
  font-size: 12px;
}
.empty {
  text-align: center;
  padding: 40px 16px;
  color: var(--muted);
}
footer {
  padding: 22px 12px 32px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}
@media (min-width: 760px) {
  .summary { grid-template-columns: repeat(4, 1fr); }
  .control-row { grid-template-columns: 1.5fr 0.7fr 0.7fr 0.7fr; }
  .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { margin-bottom: 0; }
}
</style>
</head>

const dates = ["全日", "5/3 日", "5/4 月", "5/5 火", "5/6 水", "5/7 木"];
const types = ["イベント", "ホテル", "ポスター", "事務", "口演", "移動"];
const statuses = ["一部参加予定", "予定", "任意（立ち寄り可）", "候補", "候補・ギリギリ", "候補・一部のみ", "候補・厳しめ", "候補・現実的", "候補・重複", "参加予定", "必須", "推奨", "発表", "確定"];
let activeDate = "全日";

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}
function optText(s) { return String(s || "").trim(); }

function setup() {
  const tabs = document.getElementById("dateTabs");
  dates.forEach(d => {
    const b = document.createElement("button");
    b.className = "tab" + (d === activeDate ? " active" : "");
    b.textContent = d;
    b.onclick = () => {
      activeDate = d;
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      render();
    };
    tabs.appendChild(b);
  });
  const typeSel = document.getElementById("typeFilter");
  types.forEach(t => {
    const o = document.createElement("option");
    o.value = t;
    o.textContent = t;
    typeSel.appendChild(o);
  });
  const statusSel = document.getElementById("statusFilter");
  statuses.forEach(s => {
    const o = document.createElement("option");
    o.value = s;
    o.textContent = s;
    statusSel.appendChild(o);
  });
  ["searchBox","typeFilter","statusFilter","sortSelect","actionOnly"].forEach(id => {
    document.getElementById(id).addEventListener("input", render);
    document.getElementById(id).addEventListener("change", render);
  });
  render();
}

function badgeClass(status, isAction) {
  if (isAction) return "badge action-badge";
  if (status && status.includes("候補")) return "badge candidate";
  return "badge status";
}

function card(e) {
  const end = e["終了"] ? "–" + esc(e["終了"]) : "";
  const status = esc(e["状況"] || "");
  const ids = [
    e["Session ID"] ? "Session " + e["Session ID"] : "",
    e["Presentation No."] ? (e["区分"] === "ポスター" ? "Poster " : "No. ") + e["Presentation No."] : "",
    e["Abstract ID"] ? "Abstract " + e["Abstract ID"] : ""
  ].filter(Boolean).join(" / ");
  const presenter = e["発表者/対象"] ? `<div class="presenter">${esc(e["発表者/対象"])}</div>` : "";
  const memo = e["メモ・要約"] ? `<div class="memo">${esc(e["メモ・要約"])}</div>` : "";
  return `
  <article class="card ${e["_isAction"] ? "action" : ""}">
    <div class="card-head">
      <div class="datetime">
        <span class="date">${esc(e["日付"])}</span>
        <span class="time">${esc(e["開始"])}${end}</span>
      </div>
      <div class="badges">
        <span class="badge">${esc(e["区分"])}</span>
        ${status ? `<span class="${badgeClass(e["状況"], e["_isAction"])}">${status}</span>` : ""}
      </div>
    </div>
    ${presenter}
    <div class="title-ja">${esc(e["日本語タイトル"] || e["タイトル（英語）"])}</div>
    <div class="title-en">${esc(e["タイトル（英語）"])}</div>
    <div class="meta">
      ${e["会場"] ? `<div class="meta-line"><span class="meta-key">会場</span><span>${esc(e["会場"])}</span></div>` : ""}
      ${ids ? `<div class="meta-line"><span class="meta-key">ID</span><span>${esc(ids)}</span></div>` : ""}
      ${e["Main Session"] ? `<div class="meta-line"><span class="meta-key">Session</span><span>${esc(e["Main Session"])}</span></div>` : ""}
      ${e["Section"] ? `<div class="meta-line"><span class="meta-key">Section</span><span>${esc(e["Section"])}</span></div>` : ""}
    </div>
    ${memo}
  </article>`;
}

function render() {
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  const type = document.getElementById("typeFilter").value;
  const status = document.getElementById("statusFilter").value;
  const sort = document.getElementById("sortSelect").value;
  const actionOnly = document.getElementById("actionOnly").checked;
  let rows = events.filter(e => {
    if (activeDate !== "全日" && e["_dateKey"] !== activeDate) return false;
    if (q && !e["_search"].includes(q)) return false;
    if (type && e["区分"] !== type) return false;
    if (status && e["状況"] !== status) return false;
    if (actionOnly && !e["_isAction"]) return false;
    return true;
  });
  if (sort === "action") {
    rows.sort((a,b) => Number(b["_isAction"]) - Number(a["_isAction"]) || a["_dateSort"] - b["_dateSort"] || a["_timeSort"] - b["_timeSort"]);
  } else if (sort === "type") {
    rows.sort((a,b) => String(a["区分"]).localeCompare(String(b["区分"]), "ja") || a["_dateSort"] - b["_dateSort"] || a["_timeSort"] - b["_timeSort"]);
  } else {
    rows.sort((a,b) => a["_dateSort"] - b["_dateSort"] || a["_timeSort"] - b["_timeSort"] || a["_id"] - b["_id"]);
  }
  document.getElementById("count").textContent = `${rows.length}件表示`;
  document.getElementById("cards").innerHTML = rows.length ? rows.map(card).join("") : `<div class="empty">該当する予定がありません。</div>`;
}
setup();
</script>
